name: LLM Evals (live)

# Live tests of Guardian's LLM security verifier and Hermes-like e2e evals against
# a real model. These call an external API, so they do NOT run on every PR (and
# secrets are not exposed to fork PRs anyway). They run on pushes to main and on
# manual dispatch. The free, hermetic unit matrix in tests.yml still runs on every PR.
#
# Configure in the repository:
#   - secret OPENROUTER_API_KEY       OpenRouter key
#   - secret/variable OPENROUTER_MODEL model id, e.g. openai/gpt-4o-mini.
#                                      May be a comma-separated list to test several.
# This job opts into the live tests (--run-llm), so if no backend key/model is set it
# FAILS with a message naming the env vars to add — it does not silently self-skip.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: llm-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  llm-evals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || vars.OPENROUTER_MODEL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run live LLM eval tests
        run: python -m pytest -m llm --run-llm -q
